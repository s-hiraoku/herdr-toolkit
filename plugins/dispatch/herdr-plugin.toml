id = "s-hiraoku.dispatch"
name = "Dispatch"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Launch an AI coding agent locally (split pane) or in a fresh git worktree workspace, with optional N-way parallel runs and done-notifications."
platforms = ["linux", "macos"]

[[actions]]
id = "dispatch"
title = "Dispatch agent (choose local / worktree)"
command = ["bash", "dispatch.sh"]

[[actions]]
id = "dispatch-worktree"
title = "Dispatch agent to a new worktree"
command = ["bash", "dispatch.sh", "--worktree"]

[[actions]]
id = "dispatch-local"
title = "Dispatch agent in a local split"
command = ["bash", "dispatch.sh", "--local"]
