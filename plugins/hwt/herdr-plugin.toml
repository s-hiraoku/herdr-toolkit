id = "s-hiraoku.hwt"
name = "hwt"
version = "1.0.0"
min_herdr_version = "0.7.5"
description = "Ergonomic wrapper over herdr worktree: create/list/switch/clean/remove git worktrees with short commands; optionally launch a coding agent inside."
platforms = ["linux", "macos"]

[[actions]]
id = "new"
title = "New worktree (no agent)"
command = ["bash", "hwt.sh", "new"]

[[actions]]
id = "new-agent"
title = "New worktree + launch agent"
command = ["bash", "hwt.sh", "new", "-a"]

[[actions]]
id = "ls"
title = "List hwt worktrees"
command = ["bash", "hwt.sh", "ls"]

[[actions]]
id = "cd"
title = "Switch to a worktree workspace"
command = ["bash", "hwt.sh", "cd"]

[[actions]]
id = "clean"
title = "Clean up hwt worktrees (safe: keeps changed ones)"
command = ["bash", "hwt.sh", "clean"]

[[actions]]
id = "rm"
title = "Remove the current worktree (confirm)"
command = ["bash", "hwt.sh", "rm"]
